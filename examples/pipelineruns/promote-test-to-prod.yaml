apiVersion: tekton.dev/v1
kind: PipelineRun
metadata:
  generateName: lifecycle-quest-promote-test-prod-
  namespace: gitops-demo-cicd
spec:
  pipelineRef:
    name: lifecycle-quest-promote
  serviceAccountName: pipeline
  params:
    - name: git-url
      value: https://github.com/h8x0rd/openshift-lifecycle-quest.git
    - name: git-revision
      value: main
    - name: source-environment
      value: test
    - name: target-environment
      value: prod
  workspaces:
    - name: shared-workspace
      volumeClaimTemplate:
        spec:
          accessModes:
            - ReadWriteOnce
          resources:
            requests:
              storage: 1Gi
