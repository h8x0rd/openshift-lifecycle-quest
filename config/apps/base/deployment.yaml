apiVersion: apps/v1
kind: Deployment
metadata:
  name: lifecycle-quest
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: lifecycle-quest
  template:
    metadata:
      labels:
        app.kubernetes.io/name: lifecycle-quest
    spec:
      containers:
        - name: web
          image: lifecycle-quest:latest
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 8080
          env:
            - name: APP_ENV
              value: base
            - name: APP_VERSION
              value: bootstrap
            - name: MESSAGE
              value: Welcome to OpenShift Lifecycle Quest!
          readinessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 15
            periodSeconds: 20
          resources:
            requests:
              cpu: 50m
              memory: 128Mi
            limits:
              cpu: 250m
              memory: 256Mi
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
            runAsNonRoot: true
            seccompProfile:
              type: RuntimeDefault
