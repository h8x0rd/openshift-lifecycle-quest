apiVersion: apps/v1
kind: Deployment
metadata:
  name: lifecycle-quest
spec:
  replicas: 3
  template:
    spec:
      containers:
        - name: web
          env:
            - name: APP_ENV
              value: prod
            - name: APP_VERSION
              value: f3519f4-20260513173912
            - name: MESSAGE
              value: "Production stage: GitOps victory unlocked!"
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 512Mi
