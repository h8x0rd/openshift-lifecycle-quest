apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: lifecycle-quest-prod
  namespace: openshift-gitops
  annotations:
    argocd.argoproj.io/sync-wave: "1"
spec:
  project: lifecycle-quest
  source:
    repoURL: https://github.com/h8x0rd/openshift-lifecycle-quest.git
    targetRevision: main
    path: config/apps/overlays/prod
  destination:
    server: https://kubernetes.default.svc
    namespace: gitops-demo-prod
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - RespectIgnoreDifferences=true
